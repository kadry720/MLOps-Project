repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: black
        language: system
        types: [python]
        files: ^(src/(validation|utils|pipeline)/|tests/unit/test_data_validation_pipeline.py)
      - id: ruff
        name: ruff
        entry: ruff check
        language: system
        types: [python]
        files: ^(src/(validation|utils|pipeline)/|tests/unit/test_data_validation_pipeline.py)
      - id: flake8
        name: flake8
        entry: flake8
        language: system
        types: [python]
        files: ^(src/(validation|utils|pipeline)/|tests/unit/test_data_validation_pipeline.py)
      - id: data-validation
        name: data validation
        entry: python src/pipeline/validate_pipeline.py --config configs/validation.yaml
        language: system
        pass_filenames: false
