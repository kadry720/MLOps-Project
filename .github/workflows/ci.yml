name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  quality-gate:
    name: Lint, Test, and Validate Data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: |
          ruff check src/validation src/utils src/pipeline tests/unit/test_data_validation_pipeline.py
          black --check src/validation src/utils src/pipeline tests/unit/test_data_validation_pipeline.py
          flake8 src/validation src/utils src/pipeline tests/unit/test_data_validation_pipeline.py

      - name: Run tests
        run: pytest tests/unit --cov=src --cov-report=term-missing

      - name: Run data validation gate
        env:
          DATA_VALIDATION_INPUT_PATH: tests/data/sample_fraud_transactions.csv
          DATA_VALIDATION_REFERENCE_PATH: tests/data/reference_fraud_transactions.csv
        run: python src/pipeline/validate_pipeline.py --config configs/validation.yaml

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: |
            reports/validation/validation_report.html
            reports/validation/validation_summary.json
            logs/data_validation.log
          if-no-files-found: ignore
