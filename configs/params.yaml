data:
  raw_transaction_path: data/raw/train_transaction.csv
  raw_identity_path: data/raw/train_identity.csv
  processed_path: data/processed/cleaned_data.csv
  train_path: data/splits/train.csv
  test_path: data/splits/test.csv
  target_column: isFraud
  id_column: TransactionID
  test_size: 0.2
  random_state: 42
  sample_size: 100000

preprocessing:
  numeric_imputer_strategy: median
  categorical_imputer_strategy: constant
  categorical_fill_value: missing
  onehot_handle_unknown: ignore
  onehot_max_categories: 50
  onehot_min_frequency: null
  scaler: standard
  use_smote: true
  smote_sampling_strategy: auto
  smote_k_neighbors: 5

artifacts:
  preprocessing_pipeline_path: models/preprocessing_pipeline.pkl
  best_model_path: models/best_model.pkl
  experiment_artifacts_dir: reports/experiments

training:
  tracking_uri: http://localhost:5000
  experiment_name: fraud_detection_experiments
  registered_model_name: ieee_fraud_best_model
  primary_metric: f1_score
  random_state: 42
  cv_folds: 3
  n_jobs: -1
  archive_existing_versions: true

models:
  logistic_regression:
    max_iter: 1000
    solver: liblinear
    class_weight: null
    C_values: [0.1, 1.0, 10.0]

  random_forest:
    n_estimators: [100, 200]
    max_depth: [10, 20, null]
    class_weight: null

  gradient_boosting:
    n_estimators: [100, 200]
    learning_rate: [0.05, 0.1]
    max_depth: [3, 5]
